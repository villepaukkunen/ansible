- name: system setup | logind | HandleSuspendKey
  tags: system,system-setup,logind
  lineinfile:
      dest: /etc/systemd/logind.conf
      regexp: '#HandleSuspendKey=suspend'
      line: 'HandleSuspendKey=ignore'
  notify: restart_systemd_logind

- name: system setup | logind | HandleLidSwitch
  tags: system,system-setup,logind
  lineinfile:
      dest: /etc/systemd/logind.conf
      regexp: '#HandleLidSwitch=suspend'
      line: 'HandleLidSwitch=ignore'
  notify: restart_systemd_logind

- name: system setup | logind | HandleLidSwitchDocked
  tags: system,system-setup,logind
  lineinfile:
      dest: /etc/systemd/logind.conf
      regexp: '#HandleLidSwitchDocked=ignore'
      line: 'HandleLidSwitchDocked=ignore'
  notify: restart_systemd_logind
