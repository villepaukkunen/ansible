- name: daemon_reload
  tags: system,system-setup,daemon-reload
  service:
    daemon_reload: true

- name: restart_ansible_timer
  tags: ansible,ansible-setup,systemd,timer
  service:
    name: ansible.timer
    state: reloaded
    enabled: true

- name: restart_ddclient
  tags: system,system-setup,ddclient
  service:
    name: ddclient.service
    state: restarted

- name: restart_systemd_logind
  tags: system,system-setup,logind
  service:
    name: systemd-logind.service
    state: restarted

- name: restart_unattended_upgrades
  tags: system,system-setup,unattended-upgrades
  service:
    name: unattended-upgrades.service
    state: restarted

- name: restart_wg-quick
  tags: system,system-setup,wg-quick
  service:
    name: wg-quick@wg0.service
    state: restarted