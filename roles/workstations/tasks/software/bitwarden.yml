- name: software | bitwarden | install package
  tags: packages,flatpak,bitwarden,workstation-packages
  flatpak:
    name: com.bitwarden.desktop
    state: present
  when: bitwarden_flatpak is defined and bitwarden_flatpak == true

- name: software | bitwarden | install package
  tags: packages,snap,bitwarden,workstation-packages
  snap:
    name: bitwarden
    state: present
  when: bitwarden_snap is defined and bitwarden_snap == true