# Load distro-specific variables
- include_vars: "{{ ansible_distribution }}.yml"
  tags: always

- block:
    ## User configs
    - import_tasks: users/ville.yml
    - include_tasks: users/sari.yml
      when: main_user == "sari"

    ## desktop environments
    - include_tasks: desktop_environments/gnome/appearance.yml
      when: gnome is defined and gnome == true
    - include_tasks: desktop_environments/gnome/deja_dup.yml
      when:
        - gnome is defined
        - gnome == true
        - deja_dup is defined
        - deja_dup == true
    - include_tasks: desktop_environments/gnome/peripherals.yml
      when: gnome is defined and gnome == true
    - include_tasks: desktop_environments/gnome/shell_settings.yml
      when: gnome is defined and gnome == true
    - include_tasks: desktop_environments/gnome/tiling_assistant.yml
      when: gnome is defined and gnome == true

    ## system setup
    - import_tasks: system_setup/flatpak.yml
    - include_tasks: system_setup/fstab.yml
      when: documents_dir is defined and pictures_dir is defined
    - include_tasks: system_setup/grub.yml
      when: swap_size_mb is defined
    - import_tasks: system_setup/logind_conf.yml
    - import_tasks: system_setup/sleep_conf.yml
    - include_tasks: system_setup/unattended_upgrades.yml
      when: unattended_upgrades is defined and unattended_upgrades == true

    ## install software
    - import_tasks: software/bitwarden.yml
      when: bitwarden is defined
    - import_tasks: software/brave.yml
    - import_tasks: software/codium.yml
    - import_tasks: software/gimp.yml
    - import_tasks: software/gnome_tweaks.yml
    - import_tasks: software/gnome-shell-extension-manager.yml
    - import_tasks: software/hugo.yml
    - import_tasks: software/jellyfin_media_player.yml
    - import_tasks: software/k9s.yml
    - import_tasks: software/kdenlive.yml
    - import_tasks: software/kubectl.yml
    - import_tasks: software/nextcloud.yml
    - import_tasks: software/nmap.yml
    - import_tasks: software/obsidian.yml
    - import_tasks: software/octave.yml
    - import_tasks: software/pycharm.yml
    - import_tasks: software/rustdesk.yml
    - import_tasks: software/signal.yml
    - import_tasks: software/slack.yml
    - import_tasks: software/solaar.yml
    - import_tasks: software/spotify.yml
    - import_tasks: software/teams.yml
    - import_tasks: software/telegram.yml
    - import_tasks: software/texstudio.yml
    - import_tasks: software/waveterm.yml
    - import_tasks: software/whatsie.yml
    - import_tasks: software/zoom.yml
    - import_tasks: software/zotero.yml